<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EndNode — Software Architecture Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1218;
  --bg3: #141820;
  --panel: #161b24;
  --border: #1e2836;
  --border2: #253044;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --accent4: #f59e0b;
  --accent5: #ef4444;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #475569;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
  --glow: 0 0 20px rgba(0,212,255,0.15);
  --glow2: 0 0 40px rgba(0,212,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}

/* Scanline overlay */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:1000
}

/* Grid background */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0
}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:rgba(10,12,16,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100
}
#topbar .logo{
  font-family:var(--sans);font-size:14px;font-weight:800;
  color:var(--accent);letter-spacing:2px;text-transform:uppercase
}
#topbar .sep{color:var(--border2);font-size:18px}
#topbar .breadcrumb{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden}
.bc-item{
  font-size:11px;color:var(--text2);cursor:pointer;
  padding:3px 8px;border-radius:4px;
  border:1px solid transparent;white-space:nowrap;
  transition:all .2s
}
.bc-item:hover{color:var(--accent);border-color:var(--border2)}
.bc-item.active{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,0.06)}
.bc-sep{color:var(--text3);font-size:10px}
#home-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);
  color:var(--accent);padding:5px 12px;border-radius:6px;
  cursor:pointer;font-family:var(--mono);font-size:11px;
  transition:all .2s;white-space:nowrap
}
#home-btn:hover{background:rgba(0,212,255,0.15);box-shadow:var(--glow)}
#depth-indicator{
  font-size:10px;color:var(--text3);
  padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  white-space:nowrap
}

/* MAIN AREA */
#main{
  position:fixed;top:48px;left:0;right:0;bottom:0;
  display:flex;overflow:hidden
}

/* CANVAS PANEL */
#canvas-panel{
  flex:1;position:relative;overflow:hidden;
  transition:all .4s cubic-bezier(.4,0,.2,1)
}
#canvas-panel.shrunk{flex:0 0 55%}

/* SVG canvas */
#diagram-svg{
  width:100%;height:100%;position:absolute;inset:0
}

/* INFO PANEL */
#info-panel{
  width:0;overflow:hidden;
  border-left:1px solid var(--border);
  background:var(--panel);
  transition:width .4s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column
}
#info-panel.open{width:45%}
#info-header{
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  flex-shrink:0
}
#info-title{
  font-family:var(--sans);font-size:18px;font-weight:700;
  color:var(--text);line-height:1.3
}
#info-tag{
  font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:3px;margin-top:4px;
  display:inline-block;
}
#close-panel{
  background:none;border:1px solid var(--border);color:var(--text2);
  width:28px;height:28px;border-radius:6px;cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s
}
#close-panel:hover{border-color:var(--accent);color:var(--accent)}
#info-body{flex:1;overflow-y:auto;padding:16px 20px}
#info-body::-webkit-scrollbar{width:4px}
#info-body::-webkit-scrollbar-track{background:var(--bg)}
#info-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Sub diagram in panel */
#sub-diagram{margin-bottom:16px}
#sub-diagram svg{width:100%;height:auto;display:block}

/* Description */
.desc-section{margin-bottom:16px}
.desc-label{
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);margin-bottom:8px;font-weight:600
}
.desc-text{
  font-size:12px;color:var(--text2);line-height:1.8;
  border-left:2px solid var(--border2);padding-left:12px
}
.step-list{list-style:none;padding:0}
.step-list li{
  display:flex;gap:10px;padding:7px 0;
  border-bottom:1px solid var(--border);font-size:11px;color:var(--text2)
}
.step-list li:last-child{border-bottom:none}
.step-num{
  flex-shrink:0;width:20px;height:20px;border-radius:4px;
  background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
  color:var(--accent);font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center
}
.chip{
  display:inline-block;font-size:9px;font-weight:600;
  padding:2px 6px;border-radius:3px;margin:2px 2px 2px 0;
  border:1px solid
}
.chip-blue{color:#60a5fa;border-color:#1e3a5f;background:rgba(96,165,250,0.08)}
.chip-green{color:#34d399;border-color:#064e3b;background:rgba(52,211,153,0.08)}
.chip-amber{color:#fbbf24;border-color:#78350f;background:rgba(251,191,36,0.08)}
.chip-red{color:#f87171;border-color:#7f1d1d;background:rgba(248,113,113,0.08)}
.chip-purple{color:#a78bfa;border-color:#3b1f6e;background:rgba(167,139,250,0.08)}

/* Nodes */
.node{cursor:pointer;transition:all .15s}
.node rect, .node polygon, .node ellipse{transition:all .15s}
.node:hover rect{filter:brightness(1.3)}
.node:hover polygon{filter:brightness(1.3)}
.node.clickable rect{cursor:pointer}
.node.active rect{stroke-width:2.5 !important}

/* Tooltip */
#tooltip{
  position:fixed;background:var(--panel);border:1px solid var(--accent);
  color:var(--accent);font-size:10px;padding:4px 10px;border-radius:4px;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;
  box-shadow:var(--glow);white-space:nowrap
}

/* Pulse animation for clickable nodes */
@keyframes nodePulse{
  0%,100%{opacity:1}50%{opacity:.7}
}
.pulse-hint{animation:nodePulse 2s ease-in-out infinite}

/* Zoom controls */
#zoom-controls{
  position:absolute;bottom:16px;left:16px;
  display:flex;gap:6px;z-index:50
}
.zoom-btn{
  width:30px;height:30px;border-radius:6px;
  background:var(--panel);border:1px solid var(--border2);
  color:var(--text2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s
}
.zoom-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Status bar */
#statusbar{
  position:absolute;bottom:16px;right:16px;
  font-size:10px;color:var(--text3);
  background:var(--panel);border:1px solid var(--border);
  padding:4px 10px;border-radius:4px
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">EndNode</div>
  <div class="sep">|</div>
  <div class="breadcrumb" id="breadcrumb">
    <span class="bc-item active" onclick="goHome()">Root Architecture</span>
  </div>
  <button id="home-btn" onclick="goHome()">⌂ Root</button>
  <div id="depth-indicator">DEPTH: 0</div>
</div>

<div id="main">
  <div id="canvas-panel">
    <svg id="diagram-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1.2)">+</button>
      <button class="zoom-btn" onclick="zoom(0.8)">−</button>
      <button class="zoom-btn" onclick="resetZoom()" style="font-size:10px">⟳</button>
    </div>
    <div id="statusbar">Click any node to explore</div>
  </div>
  <div id="info-panel">
    <div id="info-header">
      <div>
        <div id="info-title">—</div>
        <div id="info-tag"></div>
      </div>
      <button id="close-panel" onclick="closePanel()">✕</button>
    </div>
    <div id="info-body">
      <div id="sub-diagram"></div>
      <div id="info-content"></div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA STORE — All nodes and their detail content
// ═══════════════════════════════════════════════════════════
const NODE_DATA = {

  // ── ROOT LEVEL ──────────────────────────────────────────
  'power_on': {
    title: 'Power-On / Reset',
    tag: 'ENTRY POINT', tagColor: '#00d4ff',
    desc: 'The absolute first code to execute after VDD stabilizes. The ROM bootloader is baked into the MCU — it cannot be modified or bypassed. It handles the earliest hardware bring-up before any user firmware runs.',
    steps: [
      'VDD ramps — power supervisor holds nRESET low until rail is stable',
      'Internal RC oscillator starts (~8 MHz), provides initial clock',
      'ROM bootloader reads boot mode pins (BOOT0/BOOT1)',
      'If pins select internal flash: bootloader reads firmware vector table',
      'Stack pointer loaded from vector table offset 0x00',
      'Reset handler called — jumps into startup assembly',
      'Startup code zeros .bss, copies .data from flash to RAM',
      'SystemInit() called — configure clocks, FPU enable',
      'C runtime ready — main() or secure boot entry called'
    ],
    chips: ['ROM BOOTLOADER','VECTOR TABLE','STACK INIT','SYSTEM CLOCK'],
    chipColors: ['blue','green','amber','purple'],
    subDiagram: 'power_on_detail'
  },

  'sig_verify': {
    title: 'Verify Firmware Signature',
    tag: 'SECURITY', tagColor: '#a78bfa',
    desc: 'Cryptographic verification ensures only Anthropic-signed firmware runs. Uses ECDSA P-256 or RSA-2048. The public key is burned into OTP memory at manufacturing time and is immutable.',
    steps: [
      'ROM reads firmware image header (magic, version, size, sig)',
      'SHA-256 hash computed over entire firmware binary in flash',
      'ECDSA/RSA signature block extracted from header',
      'Public key loaded from OTP / secure element (SE050)',
      'Signature verified against computed hash',
      'If FAIL: device halts, error code written to RTC backup register, red LED blinks SOS pattern',
      'If PASS: anti-rollback version checked against fuse counter',
      'Version accepted → proceed to decryption stage'
    ],
    chips: ['ECDSA P-256','SHA-256','OTP KEY','SE050','ANTI-ROLLBACK'],
    chipColors: ['purple','blue','red','amber','green'],
    subDiagram: 'sig_verify_detail'
  },

  'decrypt_jump': {
    title: 'Decrypt & Jump to App',
    tag: 'SECURITY', tagColor: '#a78bfa',
    desc: 'Firmware is stored AES-128-CTR encrypted in flash. The decryption key is sealed inside the secure element and never exposed to the CPU bus. Decryption happens on-the-fly or into a secure SRAM region.',
    steps: [
      'Symmetric key retrieved from SE / hardware key manager',
      'AES-128-CTR decrypt initiated for app flash region',
      'Decrypted image verified with second-stage checksum (CRC32)',
      'Memory protection unit (MPU) regions configured',
      'Read-only regions locked before jump',
      'Stack canary initialized for runtime stack protection',
      'Interrupt vector table relocated to app start address',
      'Branch to application reset handler'
    ],
    chips: ['AES-128-CTR','MPU','STACK CANARY','CRC32'],
    chipColors: ['purple','blue','amber','green'],
    subDiagram: null
  },

  'mcu_clock': {
    title: 'MCU Clock & PLL Init',
    tag: 'SYSTEM INIT', tagColor: '#10b981',
    desc: 'Clock tree initialization is the foundation of all timing-dependent peripherals. A bad clock config causes silent failures in UART, SPI, and I2C. The PLL must stabilize before any peripheral init.',
    steps: [
      'HSI (16 MHz internal RC) selected as temporary clock source',
      'External HSE crystal (8–16 MHz) started, wait for HSE_RDY flag',
      'PLL configured: input HSE, multiplier → target SYSCLK (e.g. 80 MHz)',
      'Wait for PLL lock (PLLRDY flag)',
      'Flash latency wait-states set (e.g. 4WS for 80 MHz @ 3.3V)',
      'AHB prescaler = 1 (HCLK = SYSCLK)',
      'APB1 prescaler set (≤45 MHz max), APB2 prescaler set',
      'SYSCLK source switched to PLL',
      'SysTick configured for 1 ms RTOS tick',
      'Watchdog timer (IWDG) started — 4s timeout'
    ],
    chips: ['HSE XTAL','PLL','SYSCLK','SYSTICK','IWDG'],
    chipColors: ['green','blue','amber','purple','red'],
    subDiagram: null
  },

  'parallel_init': {
    title: 'Parallel Peripheral Init',
    tag: 'DRIVER LAYER', tagColor: '#00d4ff',
    desc: 'All peripheral drivers are initialized before RTOS starts. Each driver follows the same pattern: clock enable → GPIO config → peripheral config → interrupt enable → register with HAL. Click individual peripherals for detailed sequences.',
    steps: [
      'RCC clocks enabled for all required peripherals',
      'GPIO alternate functions configured for each peripheral',
      'DMA channels allocated (UART, SPI use DMA)',
      'I2C, SPI, UART peripherals initialized in parallel concept',
      'BLE stack pre-initialized (soft-device or NimBLE)',
      'Flash/EEPROM SPI drivers registered',
      'GPIO inputs (button) configured with pull-up and EXTI',
      'ADC configured for VBAT measurement (battery level)',
      'All drivers return HAL_OK or fault flag is set'
    ],
    chips: ['RCC','GPIO AF','DMA','HAL','EXTI','ADC'],
    chipColors: ['blue','green','amber','purple','red','blue'],
    subDiagram: null
  },

  'post': {
    title: 'POST — Power-On Self Test',
    tag: 'VALIDATION', tagColor: '#f59e0b',
    desc: 'Self-test verifies all hardware is functional before the RTOS starts tasks. A failed POST is written to EEPROM so the failure can be reported over BLE or LoRa when partial operation resumes.',
    steps: [
      'IMU: send WHO_AM_I command over I2C, verify device ID byte',
      'LR1120: SPI loopback test, read silicon revision register',
      'GPS: check for UART activity (NMEA stream within 500ms timeout)',
      'Flash: read/write test pattern to scratch sector, verify CRC',
      'EEPROM: write test byte to address 0x0000, read back, erase',
      'ADC: measure VBAT, check within valid range (3.0V–4.2V)',
      'BLE: verify controller responds to HCI Reset command',
      'Any failure: write fault code to RTC backup register, blink error pattern',
      'Pass: proceed to RTOS kernel start'
    ],
    chips: ['WHO_AM_I','SPI TEST','UART CHECK','CRC','VBAT','HCI'],
    chipColors: ['blue','green','amber','purple','red','blue'],
    subDiagram: null
  },

  'rtos_start': {
    title: 'RTOS Kernel Start',
    tag: 'RTOS', tagColor: '#10b981',
    desc: 'FreeRTOS (or Zephyr) scheduler kicks off. All tasks, queues, semaphores and event groups are created before vTaskStartScheduler() is called. After this call, the CPU never returns to main().',
    steps: [
      'Heap initialized (heap_4.c or pool allocator)',
      'Create queues: imu_q (depth 8), gps_q (4), lora_tx_q (16), ble_q (8)',
      'Create mutexes: shared_state_mutex, flash_mutex, i2c_bus_mutex',
      'Create event groups: sys_events (SOS_FLAG, SHUTDOWN_FLAG, BLE_CONN_FLAG)',
      'Create tasks: IMU(P5), ButtonFSM(P6), LoRaWAN(P4), GPS(P3), BLE(P3), Indicator(P1)',
      'Create software timers: batt_check(60s), gps_duty(30s), lora_keepalive(10min)',
      'vTaskStartScheduler() called — SysTick drives preemption',
      'Idle hook configured for WFI sleep',
      'Task priorities enforced; ButtonFSM highest for safety-critical response'
    ],
    chips: ['FREERTOS','HEAP_4','QUEUES','MUTEXES','EVENT GROUPS','TIMERS'],
    chipColors: ['green','blue','amber','purple','red','blue'],
    subDiagram: 'rtos_detail'
  },

  // ── PERIPHERAL SUB-NODES ────────────────────────────────
  'i2c_init': {
    title: 'I2C Init — IMU Driver',
    tag: 'PERIPHERAL DRIVER', tagColor: '#60a5fa',
    desc: 'The IMU (e.g. ICM-42688 or LSM6DSO) communicates over I2C at 400 kHz Fast Mode. The interrupt line (INT1) is wired to a GPIO EXTI line for zero-latency data-ready detection.',
    steps: [
      'Enable I2C1 clock: RCC_APB1ENR |= I2C1EN',
      'Configure SDA/SCL pins: GPIO AF4, open-drain, no pull (external 4.7kΩ)',
      'Set I2C timing register: 400 kHz Fast Mode (PRESC=1, SCLL=0x9, SCLH=0x3)',
      'Enable I2C1 peripheral: CR1 |= PE',
      'Probe IMU address (0x68 or 0x69): send START + addr + R/W',
      'Read WHO_AM_I register (0x0F), verify against expected ID',
      'Write IMU config: ODR=104Hz, ±4g accel, ±500dps gyro, INT1 data-ready',
      'Configure INT1 GPIO: input, no pull, EXTI rising edge, NVIC priority 5',
      'Register I2C error callback for bus fault recovery (timeout, NACK)',
      'IMU driver handle stored globally for task use'
    ],
    chips: ['I2C FAST MODE','400 kHz','EXTI INT','ICM-42688','WHO_AM_I','DMA RX'],
    chipColors: ['blue','green','amber','purple','red','blue'],
    subDiagram: 'i2c_detail'
  },

  'spi_init': {
    title: 'SPI Init — LR1120 Driver',
    tag: 'PERIPHERAL DRIVER', tagColor: '#60a5fa',
    desc: 'The LR1120 (LoRa + LR-FHSS + GNSS front-end) uses SPI at up to 16 MHz. NSS is software-controlled. The chip has DIO1 (TX/RX done) and BUSY lines that must be polled/interrupted.',
    steps: [
      'Enable SPI2 clock: RCC_APB1ENR |= SPI2EN',
      'Configure MOSI/MISO/SCK pins: GPIO AF5, push-pull, high speed',
      'Configure NSS pin: GPIO output push-pull, init HIGH',
      'SPI config: Master, CPOL=0 CPHA=0 (Mode 0), 16 MHz BR, 8-bit, MSB first',
      'Enable SPI2: CR1 |= SPE',
      'Configure BUSY pin: GPIO input, no pull — poll before each transaction',
      'Configure DIO1 pin: EXTI falling edge, NVIC priority 4',
      'LR1120 soft reset: assert NRESET low 100μs, release, wait BUSY low',
      'Read LR1120 bootloader version via GetVersion() SPI command',
      'Load LoRaWAN regional parameters (IN865 / AS923 for India)',
      'Configure LR-FHSS parameters for hopping spread'
    ],
    chips: ['SPI MODE0','16 MHz','DIO1 EXTI','LR1120','IN865','LR-FHSS'],
    chipColors: ['blue','green','amber','purple','red','blue'],
    subDiagram: 'spi_detail'
  },

  'uart_init': {
    title: 'UART Init — Quectel L89 GPS',
    tag: 'PERIPHERAL DRIVER', tagColor: '#60a5fa',
    desc: 'The Quectel L89 supports GPS + NavIC (IRNSS). It outputs NMEA 0183 sentences at 9600 baud by default (configurable to 115200). DMA circular buffer prevents missed characters at high rates.',
    steps: [
      'Enable USART2 clock: RCC_APB1ENR |= USART2EN',
      'Configure TX/RX pins: GPIO AF7, push-pull (TX), input (RX)',
      'UART config: 9600 baud (upgrade to 115200 after init), 8N1, no HW flow',
      'Enable DMA1 channel for USART2_RX: circular mode, 512-byte ring buffer',
      'Enable IDLE line interrupt (UART_CR1 IDLEIE) for sentence-complete detection',
      'Send PMTK command to enable NavIC constellation: $PMTK353,1,0,0,0,1*2A',
      'Send PMTK to set 1Hz update rate (or 10Hz for SOS mode)',
      'Send PMTK to enable GGA + RMC + GSA sentences only (reduce parse load)',
      'First NMEA sentence received → GPS task woken from blocked state',
      'UART error callback handles framing errors (noise on long cable runs)'
    ],
    chips: ['USART2','DMA CIRC','NMEA 0183','NAVIC','PMTK CMD','IDLE IRQ'],
    chipColors: ['blue','green','amber','purple','red','blue'],
    subDiagram: null
  },

  'ble_init': {
    title: 'BLE Init — GATT Server',
    tag: 'PERIPHERAL DRIVER', tagColor: '#60a5fa',
    desc: 'BLE stack (NimBLE or Nordic SoftDevice) provides a GATT server with custom service UUIDs. The endnode acts as peripheral; the smartphone app is central. Bonding with key storage in EEPROM enables auto-reconnect.',
    steps: [
      'HCI transport initialized (UART or embedded controller)',
      'BLE stack init: nimble_port_init() or sd_softdevice_enable()',
      'GAP config: device name "ENDNODE-XXXX" (last 4 of DevEUI), connectable undirected adv',
      'GATT server: register custom service UUID 0xFAB1',
      'Characteristics: STATUS_NOTIFY (notify), COMMAND_WRITE (write), ALERT_NOTIFY (notify)',
      'Advertising interval: 100ms (fast) → 1s (slow after 30s no connect)',
      'Security: BLE pairing mode 1 level 3 (MITM, bonding)',
      'Bond keys stored to EEPROM after first pairing',
      'Connection callback: update indicator task, set BLE_CONN_FLAG in event group',
      'Disconnect callback: restart advertising, clear flag, flush pending notifies to EEPROM'
    ],
    chips: ['NIMBLE','GATT SERVER','ADV','BONDING','EEPROM KEYS','NOTIFY'],
    chipColors: ['blue','green','amber','purple','red','blue'],
    subDiagram: null
  },

  'flash_init': {
    title: 'Flash / EEPROM Init',
    tag: 'PERIPHERAL DRIVER', tagColor: '#60a5fa',
    desc: '32 MB NOR flash (W25Q256) for firmware OTA and data logs. 2 MB EEPROM (AT24CM02) for config, bond keys, and offline message queue. Both on SPI with separate CS lines.',
    steps: [
      'SPI3 initialized for storage devices (shared bus, separate CS)',
      'Flash CS pin init HIGH, EEPROM CS pin init HIGH',
      'Flash: read JEDEC ID (0x9F), verify manufacturer = EF (Winbond)',
      'Flash: read status register, check WEL and BUSY bits cleared',
      'Flash partition table read from sector 0: OTA slot A/B, log region, scratch',
      'EEPROM: probe I2C address 0x50 (1 Mbit) + 0x51 (1 Mbit)',
      'EEPROM: read magic byte at 0x0000, verify config validity',
      'If EEPROM invalid: write factory defaults (DevEUI, join keys, region)',
      'EEPROM message queue head/tail pointers loaded into RAM',
      'Flash/EEPROM mutex created for multi-task safe access'
    ],
    chips: ['W25Q256','AT24CM02','JEDEC ID','OTA A/B','PARTITION','EEPROM Q'],
    chipColors: ['blue','green','amber','purple','red','blue'],
    subDiagram: null
  },

  'gpio_init': {

// ═══════════════════════════════════════════════════════════
// RENDERING ENGINE
// ═══════════════════════════════════════════════════════════
let currentDiagram = ROOT_DIAGRAM;
let breadcrumbTrail = [{label:'Root Architecture', action:goHome}];
let svgPanX = 0, svgPanY = 0, svgScale = 1;
let isDragging = false, dragStart = {x:0, y:0};

const svg = document.getElementById('diagram-svg');
const tooltip = document.getElementById('tooltip');

function renderDiagram(diag) {
  currentDiagram = diag;
  svg.innerHTML = '';
  svg.setAttribute('viewBox', diag.viewBox || '0 0 760 920');

  const ns = 'http://www.w3.org/2000/svg';
  const defs = document.createElementNS(ns, 'defs');
  defs.innerHTML = `<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/></marker>
  <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/></marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/></marker>`;
  svg.appendChild(defs);

  const g = document.createElementNS(ns, 'g');
  g.setAttribute('id', 'diagram-root');
  g.setAttribute('transform', `translate(${svgPanX},${svgPanY}) scale(${svgScale})`);
  svg.appendChild(g);

  // Draw arrows first (behind nodes)
  (diag.arrows || []).forEach(a => {
    const el = document.createElementNS(ns, 'line');
    el.setAttribute('x1', a.x1); el.setAttribute('y1', a.y1);
    el.setAttribute('x2', a.x2); el.setAttribute('y2', a.y2);
    const col = a.color || '#00d4ff';
    el.setAttribute('stroke', col);
    el.setAttribute('stroke-width', '0.8');
    el.setAttribute('fill', 'none');
    if (a.dashed) el.setAttribute('stroke-dasharray', '4 3');
    const mId = col === '#ef4444' ? 'arr-red' : col === '#10b981' ? 'arr-green' : 'arr';
    el.setAttribute('marker-end', `url(#${mId})`);
    g.appendChild(el);
  });

  // Draw nodes
  diag.nodes.forEach(n => {
    const data = NODE_DATA[n.id];
    const isClickable = n.clickable !== false && data;

    const grp = document.createElementNS(ns, 'g');
    grp.setAttribute('class', 'node' + (isClickable ? ' clickable' : ''));
    grp.style.cursor = isClickable ? 'pointer' : 'default';

    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('x', n.x); rect.setAttribute('y', n.y);
    rect.setAttribute('width', n.w); rect.setAttribute('height', n.h);
    rect.setAttribute('rx', '7');
    rect.setAttribute('fill', n.color);
    rect.setAttribute('stroke', n.stroke);
    rect.setAttribute('stroke-width', '1');
    grp.appendChild(rect);

    const cx = n.x + n.w/2;
    const ty1 = n.sub ? n.y + n.h/2 - 8 : n.y + n.h/2;

    const t1 = document.createElementNS(ns, 'text');
    t1.setAttribute('x', cx); t1.setAttribute('y', ty1);
    t1.setAttribute('text-anchor', 'middle');
    t1.setAttribute('dominant-baseline', 'central');
    t1.setAttribute('fill', n.text);
    t1.setAttribute('font-size', '11');
    t1.setAttribute('font-weight', '600');
    t1.setAttribute('font-family', "'JetBrains Mono', monospace");
    t1.textContent = n.label;
    grp.appendChild(t1);

    if (n.sub) {
      const t2 = document.createElementNS(ns, 'text');
      t2.setAttribute('x', cx); t2.setAttribute('y', n.y + n.h/2 + 9);
      t2.setAttribute('text-anchor', 'middle');
      t2.setAttribute('dominant-baseline', 'central');
      t2.setAttribute('fill', n.text);
      t2.setAttribute('font-size', '9');
      t2.setAttribute('font-family', "'JetBrains Mono', monospace");
      t2.setAttribute('opacity', '0.6');
      t2.textContent = n.sub;
      grp.appendChild(t2);
    }

    // Hover glow effect
    if (isClickable) {
      grp.addEventListener('mouseenter', e => {
        rect.setAttribute('stroke-width', '1.8');
        rect.style.filter = 'brightness(1.4)';
        showTooltip(e, n.label);
      });
      grp.addEventListener('mouseleave', () => {
        rect.setAttribute('stroke-width', '1');
        rect.style.filter = '';
        hideTooltip();
      });
      grp.addEventListener('click', e => {
        e.stopPropagation();
        openNode(n.id, n.label);
      });
    }

    g.appendChild(grp);
  });

  // Section label for parallel init
  if (diag === ROOT_DIAGRAM) {
    const dashRect = document.createElementNS(ns, 'rect');
    dashRect.setAttribute('x', '34'); dashRect.setAttribute('y', '474');
    dashRect.setAttribute('width', '522'); dashRect.setAttribute('height', '152');
    dashRect.setAttribute('rx', '8'); dashRect.setAttribute('fill', 'none');
    dashRect.setAttribute('stroke', '#253044'); dashRect.setAttribute('stroke-width', '0.7');
    dashRect.setAttribute('stroke-dasharray', '5 4');
    g.insertBefore(dashRect, g.firstChild.nextSibling);

    const appRect = document.createElementNS(ns, 'rect');
    appRect.setAttribute('x', '158'); appRect.setAttribute('y', '814');
    appRect.setAttribute('width', '444'); appRect.setAttribute('height', '108');
    appRect.setAttribute('rx', '8'); appRect.setAttribute('fill', 'rgba(16,185,129,0.04)');
    appRect.setAttribute('stroke', '#064e3b'); appRect.setAttribute('stroke-width', '0.7');
    appRect.setAttribute('stroke-dasharray', '5 4');
    g.insertBefore(appRect, g.firstChild.nextSibling);
  }

  updateStatusBar();
}

function openNode(id, label) {
  const data = NODE_DATA[id];
  if (!data) return;

  // Update breadcrumb
  breadcrumbTrail.push({label, action: () => {
    // already open, just close panel or re-render
    openNode(id, label);
  }});
  updateBreadcrumb();

  // Open panel
  const panel = document.getElementById('info-panel');
  const canvas = document.getElementById('canvas-panel');
  panel.classList.add('open');
  canvas.classList.add('shrunk');

  // Set header
  document.getElementById('info-title').textContent = data.title;
  const tag = document.getElementById('info-tag');
  tag.textContent = data.tag;
  tag.style.color = data.tagColor;
  tag.style.borderColor = data.tagColor + '44';
  tag.style.background = data.tagColor + '11';

  // Sub diagram
  const subEl = document.getElementById('sub-diagram');
  if (data.subDiagram && SUB_DIAGRAMS[data.subDiagram]) {
    subEl.innerHTML = SUB_DIAGRAMS[data.subDiagram];
    subEl.style.display = 'block';
  } else {
    subEl.innerHTML = '';
    subEl.style.display = 'none';
  }

  // Content
  const content = document.getElementById('info-content');
  let html = '';

  html += `<div class="desc-section">
    <div class="desc-label">Overview</div>
    <div class="desc-text">${data.desc}</div>
  </div>`;

  if (data.chips && data.chips.length) {
    html += `<div class="desc-section"><div class="desc-label">Key components</div><div>`;
    data.chips.forEach((c, i) => {
      const col = data.chipColors[i] || 'blue';
      html += `<span class="chip chip-${col}">${c}</span>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="desc-section">
    <div class="desc-label">Execution sequence</div>
    <ul class="step-list">`;
  data.steps.forEach((s, i) => {
    html += `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`;
  });
  html += `</ul></div>`;

  content.innerHTML = html;

  // Update depth
  document.getElementById('depth-indicator').textContent = `DEPTH: ${breadcrumbTrail.length - 1}`;
  document.getElementById('statusbar').textContent = `Viewing: ${data.title}`;
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('canvas-panel').classList.remove('shrunk');
  if (breadcrumbTrail.length > 1) breadcrumbTrail.pop();
  updateBreadcrumb();
  document.getElementById('depth-indicator').textContent = `DEPTH: ${breadcrumbTrail.length - 1}`;
  document.getElementById('statusbar').textContent = 'Click any node to explore';
}

function goHome() {
  closePanel();
  breadcrumbTrail = [{label:'Root Architecture', action:goHome}];
  updateBreadcrumb();
  svgPanX = 0; svgPanY = 0; svgScale = 1;
  renderDiagram(ROOT_DIAGRAM);
  document.getElementById('depth-indicator').textContent = 'DEPTH: 0';
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  breadcrumbTrail.forEach((item, i) => {
    const span = document.createElement('span');
    span.className = 'bc-item' + (i === breadcrumbTrail.length - 1 ? ' active' : '');
    span.textContent = item.label;
    span.onclick = item.action;
    bc.appendChild(span);
    if (i < breadcrumbTrail.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep';
      sep.textContent = '›';
      bc.appendChild(sep);
    }
  });
}

function showTooltip(e, text) {
  tooltip.textContent = 'Click to explore: ' + text;
  tooltip.style.opacity = '1';
  moveTooltip(e);
}
function hideTooltip() { tooltip.style.opacity = '0'; }
function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY - 28) + 'px';
}
document.addEventListener('mousemove', moveTooltip);

function zoom(factor) {
  svgScale = Math.min(3, Math.max(0.3, svgScale * factor));
  document.getElementById('diagram-root').setAttribute('transform',
    `translate(${svgPanX},${svgPanY}) scale(${svgScale})`);
}
function resetZoom() {
  svgScale = 1; svgPanX = 0; svgPanY = 0;
  document.getElementById('diagram-root').setAttribute('transform',
    `translate(0,0) scale(1)`);
}

// Pan support
svg.addEventListener('mousedown', e => {
  if (e.target === svg || e.target.tagName === 'line') {
    isDragging = true;
    dragStart = {x: e.clientX - svgPanX, y: e.clientY - svgPanY};
    svg.style.cursor = 'grabbing';
  }
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  svgPanX = e.clientX - dragStart.x;
  svgPanY = e.clientY - dragStart.y;
  const el = document.getElementById('diagram-root');
  if (el) el.setAttribute('transform', `translate(${svgPanX},${svgPanY}) scale(${svgScale})`);
});
document.addEventListener('mouseup', () => { isDragging = false; svg.style.cursor = ''; });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, {passive:false});

function updateStatusBar() {
  const clickable = (currentDiagram.nodes || []).filter(n => n.clickable !== false && NODE_DATA[n.id]).length;
  document.getElementById('statusbar').textContent = `${clickable} interactive nodes · Drag to pan · Scroll to zoom`;
}

// Init
renderDiagram(ROOT_DIAGRAM);
</script>
